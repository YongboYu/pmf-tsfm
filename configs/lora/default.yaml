# LoRA configuration for fine-tuning (Moirai default)
# Paper settings: r=2, alpha=4 (Section 4.1)
# Applied to Q, K, V, O weight matrices in self-attention

# LoRA rank - small rank reduces overfitting on limited PMF data
r: 2

# LoRA alpha - scaling factor (typically 2x rank)
alpha: 4

# LoRA dropout - no dropout (paper setting)
dropout: 0.0

# Target modules - Moirai attention layer names
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - out_proj

# Bias handling
bias: none
