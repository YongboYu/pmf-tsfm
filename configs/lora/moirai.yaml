# LoRA configuration for Moirai models
# Paper settings (Section 4.1): r=2, alpha=4, applied to Q/K/V/O in self-attention
# Moirai 1.1 uses standard transformer naming: q_proj, k_proj, v_proj, out_proj

# LoRA rank
r: 2

# LoRA alpha - scaling factor
alpha: 4

# LoRA dropout
dropout: 0.0

# Target modules - Moirai 1.1 attention layers
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - out_proj

# Bias handling
bias: none
