# @package _global_

# Evaluation configuration
#
# Recursively discovers all *_predictions.npy files under results_dir and
# computes paper-formula MAE / RMSE (mean +/- std across DF series).
#
# Usage:
#   # Evaluate all zero-shot results
#   python -m pmf_tsfm.evaluate
#
#   # Evaluate a specific task
#   python -m pmf_tsfm.evaluate task=lora_tune
#   python -m pmf_tsfm.evaluate task=full_tune
#
#   # Evaluate a single model+dataset directory directly
#   python -m pmf_tsfm.evaluate \
#     results_dir=outputs/zero_shot/BPI2017/chronos_bolt_small

defaults:
  - _self_
  - paths: default
  - logger: disabled           # override: logger=wandb  or  logger=wandb_offline
  - optional local: default    # machine-specific overrides in configs/local/default.yaml (git-ignored)

# Task type: zero_shot | lora_tune | full_tune
# Controls which subdirectory of output_dir is searched by default.
task: zero_shot

# Root directory searched recursively for *_predictions.npy files.
# Override to point at a specific model+dataset subdirectory when needed.
results_dir: ${paths.output_dir}/${task}

# Write per-result metrics JSON files next to the prediction arrays
save: true

# ============== Hydra Settings ==============
hydra:
  run:
    dir: ${paths.output_dir}/hydra/eval/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false
