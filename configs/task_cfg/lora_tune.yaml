# LoRA fine-tuning task configuration
name: "lora_tune"

# Context mode for training (fixed window only for training)
context_mode: "fixed"

# Context length for training sequences (sliding 48-day window, paper Section 4.1)
train_context_length: 48

# Patch size for training (paper: fixed at 16 for all fine-tuning experiments)
patch_size: 16

# LoRA adapter output directory (relative to output_dir)
adapter_save_dir: "lora_adapter"

# Whether to use mixed precision training (disabled on MPS/CPU, active on CUDA)
use_amp: true
