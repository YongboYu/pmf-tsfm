comment: false

github_checks:
  annotations: false

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "tests/**/*"
  - "temp/**/*"
  - "example/**/*"
  - "**/__pycache__/**"
